<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理者画面 - ルーム・場所作成</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background: #333; color: white; }
        .container { max-width: 900px; margin: auto; }
        .card { background: #444; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        input, button, select, textarea { padding: 10px; font-size: 16px; margin-top: 10px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #555; }
        th, td { padding: 10px; border: 1px solid #777; text-align: left; }
        th { background: #222; }
        .credentials { background: #000; padding: 5px; color: #0f0; font-family: monospace; border-radius: 3px; }
        .btn-action { margin: 2px; padding: 5px 10px; font-size: 14px; cursor: pointer; border: none; border-radius: 4px; color: white;}
        .btn-copy { background: #0066cc; }
        .btn-enter { background: #28a745; }
        .sheet-editor { width: 100%; height: 300px; font-family: monospace; font-size: 16px; padding: 10px; line-height: 1.5; white-space: pre; overflow-wrap: normal; overflow-x: scroll; }
    </style>
</head>
<body>
    <div class="container">
        <h2>⚙️ 管理者専用ダッシュボード</h2>
        
        <div class="card">
            <h3>① 新しいルームを作成</h3>
            <input type="text" id="roomName" placeholder="例：第1回社内会議, 渋谷現場 など" style="width: 70%;">
            <button onclick="createRoom()">ルーム作成</button>
        </div>

        <div class="card">
            <h3>② フォルダ管理シート（エクセルからコピペ・編集・削除）</h3>
            <p style="font-size: 14px; color: #bbb;">ルームを選択するとシートが開きます。1行が1つのフォルダ名（セル）として機能します。</p>
            <select id="roomSelect" onchange="loadEditorSheet()" style="width: 100%;">
                <option value="">▼ 対象のルームを選択してください</option>
            </select>

            <div id="editorArea" style="display: none; background: #555; padding: 15px; border-radius: 8px; margin-top: 15px;">
                <p style="margin-top: 0; color: #ffcc00; font-size: 13px;">⚠️ 注意：名前を書き換えると「古いフォルダの削除」と「新しいフォルダの作成」とみなされ、中の写真が消えます。</p>
                <textarea id="sheetEditor" class="sheet-editor" placeholder="エクセルの列をここに貼り付けてください。&#10;改行して名前を打つとフォルダが追加され、行を消すとフォルダが削除されます。"></textarea>
                <button onclick="syncLocations()" style="background: #28a745; font-size: 18px; font-weight: bold; padding: 15px;">💾 このリストの通りに保存する</button>
            </div>
        </div>

        <div class="card">
            <h3>作成済みルーム一覧</h3>
            <table>
                <thead>
                    <tr>
                        <th>ルーム名</th>
                        <th>ID / PASS</th>
                        <th>アクション</th>
                    </tr>
                </thead>
                <tbody id="roomList"></tbody>
            </table>
        </div>
    </div>

    <script>
        function loadRooms() {
            const currentSelectValue = document.getElementById('roomSelect').value;
            fetch('/api/admin/rooms')
                .then(res => res.json())
                .then(rooms => {
                    const tbody = document.getElementById('roomList');
                    const roomSelect = document.getElementById('roomSelect');
                    
                    tbody.innerHTML = '';
                    roomSelect.innerHTML = '<option value="">▼ 対象のルームを選択してください</option>';

                    rooms.forEach(room => {
                        roomSelect.innerHTML += `<option value="${room.id}">${room.name}</option>`;
                        tbody.innerHTML += `
                            <tr>
                                <td><strong>${room.name}</strong></td>
                                <td>ID: <span class="credentials">${room.login_id}</span><br>PW: <span class="credentials">${room.login_pass}</span></td>
                                <td>
                                    <button class="btn-action btn-copy" onclick="copyInfo('${room.name}', '${room.login_id}', '${room.login_pass}')">📋 メール用にコピー</button><br>
                                    <button class="btn-action btn-enter" onclick="enterRoom('${room.login_id}', '${room.login_pass}')">🚪 入室</button>
                                </td>
                            </tr>
                        `;
                    });

                    if (currentSelectValue) {
                        document.getElementById('roomSelect').value = currentSelectValue;
                        loadEditorSheet(); 
                    }
                });
        }

        function loadEditorSheet() {
            const roomId = document.getElementById('roomSelect').value;
            const editorArea = document.getElementById('editorArea');
            const sheetEditor = document.getElementById('sheetEditor');

            if (!roomId) {
                editorArea.style.display = 'none';
                return;
            }

            editorArea.style.display = 'block';
            fetch(`/api/locations/${roomId}`)
                .then(res => res.json())
                .then(locations => {
                    // フォルダ名を改行でつないでテキストエリア（シート）に表示
                    sheetEditor.value = locations.map(loc => loc.name).join('\n');
                });
        }

        function syncLocations() {
            const roomId = document.getElementById('roomSelect').value;
            const text = document.getElementById('sheetEditor').value;
            const names = text.split('\n');

            fetch(`/api/admin/locations/sync/${roomId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ names: names })
            }).then(() => {
                alert('シートの通りにフォルダを同期・保存しました！');
                loadRooms();
            });
        }

        function createRoom() {
            const name = document.getElementById('roomName').value;
            if (!name) return alert('ルーム名を入力してください');
            fetch('/api/admin/rooms', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ roomName: name })
            }).then(() => {
                document.getElementById('roomName').value = '';
                loadRooms();
            });
        }

        function copyInfo(name, id, pass) {
            const appUrl = window.location.origin;
            const loginUrl = `${appUrl}/?id=${id}`;
            const text = `【写真共有ルームのお知らせ】\n\nルーム名：${name}\n\n▼以下のURLを開くとIDが自動入力されます\n${loginUrl}\n\n※最初のアクセス時は、サーバーの起動待ちのため画面が表示されるまで約1分ほどかかる場合があります。そのままお待ちください。\n\nログインID：${id}\nパスワード：${pass}`;
            navigator.clipboard.writeText(text).then(() => {
                alert('コピーしました！メールに貼り付けてください。');
            });
        }

        function enterRoom(id, pass) {
            window.open(`${window.location.origin}/?id=${id}&pass=${pass}&auto=true`, '_blank');
        }

        loadRooms();
    </script>
</body>
</html>
