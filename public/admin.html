<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理者画面 - ルーム・場所作成</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background: #333; color: white; }
        .container { max-width: 900px; margin: auto; }
        .card { background: #444; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        input, button, select, textarea { padding: 10px; font-size: 16px; margin-top: 10px; box-sizing: border-box; }
        textarea { width: 100%; height: 100px; resize: vertical; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #555; }
        th, td { padding: 10px; border: 1px solid #777; text-align: left; }
        th { background: #222; }
        .credentials { background: #000; padding: 5px; color: #0f0; font-family: monospace; border-radius: 3px; }
        ul { margin: 0; padding-left: 20px; }
        .btn-action { margin: 2px; padding: 5px 10px; font-size: 14px; cursor: pointer; border: none; border-radius: 4px; color: white;}
        .btn-copy { background: #0066cc; }
        .btn-enter { background: #28a745; }
    </style>
</head>
<body>
    <div class="container">
        <h2>⚙️ 管理者専用ダッシュボード</h2>
        
        <div class="card">
            <h3>① 新しいルームを作成する</h3>
            <input type="text" id="roomName" placeholder="例：第1回社内会議, 渋谷現場 など" style="width: 70%;">
            <button onclick="createRoom()">ルーム作成</button>
        </div>

        <div class="card">
            <h3>② ルーム内に「アップ場所（フォルダ）」を追加する</h3>
            <select id="roomSelect" style="width: 100%;">
                <option value="">▼ 対象のルームを選択</option>
            </select>
            <textarea id="locationNames" placeholder="場所名を入力（エクセルからのコピペOK！ 改行で複数一気に登録できます）"></textarea>
            <button onclick="createLocationsBulk()">場所を一括追加</button>
        </div>

        <div class="card">
            <h3>作成済みルーム・場所一覧</h3>
            <table>
                <thead>
                    <tr>
                        <th>ルーム名</th>
                        <th>ID / PASS</th>
                        <th>アップ場所（フォルダ）</th>
                        <th>アクション</th>
                    </tr>
                </thead>
                <tbody id="roomList">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        function loadRooms() {
            fetch('/api/admin/rooms')
                .then(res => res.json())
                .then(rooms => {
                    const tbody = document.getElementById('roomList');
                    const roomSelect = document.getElementById('roomSelect');
                    
                    tbody.innerHTML = '';
                    roomSelect.innerHTML = '<option value="">▼ 対象のルームを選択</option>';

                    rooms.forEach(room => {
                        roomSelect.innerHTML += `<option value="${room.id}">${room.name}</option>`;
                        
                        // ★ここを変更：リスト(li)ではなく、編集可能なシート(table)形式にする
                        let locationsSheet = '<span style="color:#aaa;">(なし)</span>';
                        if (room.locations && room.locations.length > 0) {
                            locationsSheet = `<table style="width:100%; background:#fff; color:#000; margin:0;">
                                ${room.locations.map(loc => `
                                    <tr>
                                        <td style="padding:5px; border:1px solid #ccc;">
                                            <input type="text" id="loc_name_${loc.id}" value="${loc.name}" style="width:100%; margin:0; padding:5px; font-size:14px;">
                                        </td>
                                        <td style="width: 110px; padding:5px; border:1px solid #ccc; text-align:center;">
                                            <button onclick="updateLocation(${loc.id})" style="background:#28a745; color:#fff; padding:5px; margin:0; font-size:12px; border:none; border-radius:3px; cursor:pointer;">保存</button>
                                            <button onclick="deleteLocation(${loc.id})" style="background:#dc3545; color:#fff; padding:5px; margin:0; font-size:12px; border:none; border-radius:3px; cursor:pointer;">削除</button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </table>`;
                        }

                        tbody.innerHTML += `
                            <tr>
                                <td><strong>${room.name}</strong></td>
                                <td>ID: <span class="credentials">${room.login_id}</span><br>PW: <span class="credentials">${room.login_pass}</span></td>
                                <td style="padding:0;">${locationsSheet}</td>
                                <td>
                                    <button class="btn-action btn-copy" onclick="copyInfo('${room.name}', '${room.login_id}', '${room.login_pass}')">📋 メール用にコピー</button><br>
                                    <button class="btn-action btn-enter" onclick="enterRoom('${room.login_id}', '${room.login_pass}')">🚪 このルームに入る</button>
                                </td>
                            </tr>
                        `;
                    });
                });
        }

        // --- 追加：場所の変更を保存 ---
        function updateLocation(id) {
            const newName = document.getElementById(`loc_name_${id}`).value;
            fetch(`/api/admin/locations/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: newName })
            }).then(() => alert('保存しました！'));
        }

        // --- 追加：場所を削除 ---
        function deleteLocation(id) {
            if (!confirm('本当にこの場所を削除しますか？\n（※中の写真も消えてしまいます）')) return;
            fetch(`/api/admin/locations/${id}`, { method: 'DELETE' })
                .then(() => loadRooms());
        }


        function createRoom() {
            const name = document.getElementById('roomName').value;
            if (!name) return alert('ルーム名を入力してください');
            fetch('/api/admin/rooms', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ roomName: name })
            }).then(() => {
                document.getElementById('roomName').value = '';
                loadRooms();
            });
        }

        // --- 複数行を一気に登録する処理 ---
        function createLocationsBulk() {
            const roomId = document.getElementById('roomSelect').value;
            const text = document.getElementById('locationNames').value;

            if (!roomId) return alert('対象のルームを選択してください');
            
            // 改行でバラバラにし、空白行を除外してリストを作る
            const names = text.split('\\n').map(n => n.trim()).filter(n => n !== '');
            if (names.length === 0) return alert('場所名を入力してください');

            fetch('/api/admin/locations/bulk', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ roomId: roomId, locationNames: names })
            }).then(() => {
                document.getElementById('locationNames').value = '';
                loadRooms();
            });
        }

        // --- メール用コピー機能 ---
        function copyInfo(name, id, pass) {
            // 現在のURLを取得してパラメータを付ける
            const appUrl = window.location.origin;
            const loginUrl = `${appUrl}/?id=${id}`;
            const text = `【写真共有ルームのお知らせ】\n\nルーム名：${name}\n\n▼以下のURLを開くとIDが自動入力されます\n${loginUrl}\n\nログインID：${id}\nパスワード：${pass}`;

            navigator.clipboard.writeText(text).then(() => {
                alert('クリップボードにコピーしました！\nメールやLINEにそのまま貼り付けできます。');
            }).catch(() => alert('コピーに失敗しました'));
        }

        // --- 管理画面から直接入室する機能 ---
        function enterRoom(id, pass) {
            const appUrl = window.location.origin;
            // auto=true という秘密の暗号をつけて新しいタブで開く
            window.open(`${appUrl}/?id=${id}&pass=${pass}&auto=true`, '_blank');
        }

        loadRooms();
    </script>
</body>
</html>
